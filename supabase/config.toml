project_id = "searchable"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = [
  "http://127.0.0.1:3000",
  "http://localhost:3000",
  "http://127.0.0.1:3000/auth/callback",
  "http://localhost:3000/auth/callback"
]
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

[functions.track]
verify_jwt = false
